<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart City</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    transition: 0.3s;
}

.light {
    background: white;
    color: black;
}

/* HEADER */
header {
    background: url('https://images.unsplash.com/photo-1508057198894-247b23fe5ade') center/cover;
    height: 100vh;
    position: relative;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

.header-content {
    position: relative;
    text-align: center;
    top: 40%;
}

.header-content h1 {
    font-size: 60px;
    text-shadow: 0 0 30px #38bdf8;
}

/* BUTTON MODE */
.mode-btn {
    position: fixed;
    top: 10px;
    right: 10px;
}

/* SECTIONS */
section {
    padding: 60px;
    text-align: center;
    opacity: 0;
    transform: translateY(50px);
    transition: 1s;
}

section.show {
    opacity: 1;
    transform: translateY(0);
}

/* SLIDER */
.slider img {
    width: 80%;
    border-radius: 15px;
}

/* BUTTON */
button {
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 10px;
    color: white;
}

/* CARD */
.cards {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
}

.card {
    background: #1e293b;
    padding: 20px;
    margin: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<button class="mode-btn" onclick="toggleMode()">🌗 Mode</button>

<header>
<div class="overlay"></div>
<div class="header-content">
<h1>🌆 SMART CITY</h1>
<p>Tekonlogji informacioni dhe komunikimi</p>
</div>
</header>

<section>
<h2>Çfarë është Smart City?</h2>
<p>Qytetet inteligjente përdorin teknologji moderne për të përmirësuar jetën.</p>
</section>

<section>
<h2>📊 Grafik</h2>
<canvas id="chart"></canvas>
</section>

<section>
<h2>🎞️ Slider (Qytete natën)</h2>
<div class="slider">
<img id="slide" src="https://images.unsplash.com/photo-1549692520-acc6669e2f0c">
</div>
</section>

<section>
<h2>🗺️ Harta</h2>
<iframe src="https://maps.google.com/maps?q=Tirana&output=embed" style="width:90%;height:300px;"></iframe>
</section>

<section>
<h2>🌦️ Mot live</h2>
<p id="weather"></p>
</section>

<section>
<h2>🚗 Trafiku</h2>
<p id="traffic"></p>
</section>

<section>
<h2>🔊 Audio</h2>
<button onclick="speak()">Degjo</button>
</section>

<section>
<h2>🔔 Njoftim</h2>
<button onclick="alert('Mirësevini në Smart City')">Kliko</button>
</section>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
// DARK MODE
function toggleMode(){
document.body.classList.toggle("light");
}

// CHART
new Chart(document.getElementById('chart'), {
type:'bar',
data:{
labels:['Trafik','Siguri','Energji'],
datasets:[{data:[80,70,85]}]
}
});

// WEATHER
fetch("https://api.open-meteo.com/v1/forecast?latitude=41.33&longitude=19.82&current_weather=true")
.then(r=>r.json())
.then(d=>{
document.getElementById("weather").innerText="Temp: "+d.current_weather.temperature+"°C";
});

// TRAFFIC
setInterval(()=>{
let s=["Normal","I rënduar","Shumë i rënduar"];
document.getElementById("traffic").innerText=s[Math.random()*3|0];
},2000);

// AUDIO
function speak(){
speechSynthesis.speak(new SpeechSynthesisUtterance("Smart City është e ardhmja"));
}

// SLIDER
let imgs=[
"https://images.unsplash.com/photo-1549692520-acc6669e2f0c",
"https://images.unsplash.com/photo-1503899036084-c55cdd92da26",
"https://images.unsplash.com/photo-1494526585095-c41746248156"
];

let i=0;
setInterval(()=>{
i=(i+1)%imgs.length;
document.getElementById("slide").src=imgs[i];
},3000);

// SCROLL ANIMATION
window.addEventListener("scroll",()=>{
document.querySelectorAll("section").forEach(s=>{
if(window.scrollY > s.offsetTop-400){
s.classList.add("show");
}
});
});
</script>

</body>
</html>
